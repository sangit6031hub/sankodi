# ============================================================================
# GitHub Actions: Build and Release Workflow
# ============================================================================
#
# REQUIREMENTS:
# - GitHub repository with Actions enabled
# - Repository secret: GITHUB_TOKEN (automatically available)
# - File structure:
#   - plugin.video.sankodi/addon.xml
#   - repository.sankodi/addons.xml
#   - plugin.video.sankodi/ (directory to zip)
#   - repository.sankodi/ (directory to zip)
#
# TRIGGERS:
# - Pushes to main or master branches
# - Manual trigger via GitHub Actions UI
#
# OUTPUTS:
# - Automatic version: 1.0.X (where X = run number)
# - Creates GitHub Release with tags: v1.0.X
# - Artifacts:
#   - plugin.video.sankodi-1.0.X.zip
#   - repository.sankodi-1.0.X.zip
#   - repository.sankodi/addons.xml.md5 (checksum)
#
# USAGE:
# 1. Commit and push code to main/master
# 2. Workflow runs automatically
# 3. Check Actions tab for status
# 4. Releases appear at: https://github.com/user/sankodi/releases
#
# LOCAL TESTING:
# act -j release  # requires https://github.com/nektos/act
#
# ============================================================================

name: Build and Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Generate version
        id: version
        run: |
          VERSION="1.0.${{ github.run_number }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update plugin addon.xml
        run: |
          sed -i 's/version="[^"]*"/version="${{ env.VERSION }}"/g' plugin.video.sankodi/addon.xml

      - name: Update repository addons.xml
        run: |
          sed -i 's/version="[^"]*"/version="${{ env.VERSION }}"/g' repository.sankodi/addons.xml

      - name: Generate checksum
        run: |
          cd repository.sankodi
          md5sum addons.xml > addons.xml.md5
          cd ..

      - name: Build plugin zip
        run: |
          zip -r plugin.video.sankodi-${{ env.VERSION }}.zip plugin.video.sankodi

      - name: Build repository zip
        run: |
          zip -r repository.sankodi-${{ env.VERSION }}.zip repository.sankodi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          draft: false
          prerelease: false
          files: |
            plugin.video.sankodi-${{ env.VERSION }}.zip
            repository.sankodi-${{ env.VERSION }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
