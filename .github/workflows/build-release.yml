name: Build and Release Kodi Addon

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Generate version
      id: version
      run: |
        # Generate version based on run number
        RUN_NUMBER=${{ github.run_number }}
        VERSION="1.0.${RUN_NUMBER}"
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "Generated version: ${VERSION}"

    - name: Update addon version
      run: |
        VERSION=${{ steps.version.outputs.version }}
        # Update plugin addon.xml
        sed -i "s/version=\"[^\"]*\"/version=\"$VERSION\"/" plugin.video.sankodi/addon.xml
        # Update repository addons.xml
        sed -i "s/version=\"[^\"]*\"/version=\"$VERSION\"/" repository.sankodi/addons.xml

    - name: Regenerate repository checksum
      run: |
        cd repository.sankodi
        md5sum addons.xml > addons.xml.md5 || md5 addons.xml > addons.xml.md5
        cd ..

    - name: Validate addon
      run: |
        python -c "
        import xml.etree.ElementTree as ET
        tree = ET.parse('plugin.video.sankodi/addon.xml')
        root = tree.getroot()
        version = root.attrib['version']
        print(f'Addon version: {version}')
        "

    - name: Create addon zip
      run: |
        cd plugin.video.sankodi
        zip -r ../plugin.video.sankodi.zip .
        cd ..

    - name: Create repository zip
      run: |
        cd repository.sankodi
        zip -r ../repository.sankodi.zip .
        cd ..

    - name: Create release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: auto-${{ steps.version.outputs.version }}
        name: Auto Build ${{ steps.version.outputs.version }}
        draft: false
        prerelease: true
        files: |
          plugin.video.sankodi.zip
          repository.sankodi.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}